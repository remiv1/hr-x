<div class="collapsible-item bibliography-item card">
  <div class="item-header" tabindex="0" role="button" aria-expanded="true">
    <div class="item-summary">
      <span class="item-title">Nouvelle publication</span>
      <span class="item-meta muted"></span>
    </div>
    <div class="item-controls">
      <button type="button" class="icon-button remove-bibliography" aria-label="Supprimer" title="Supprimer">✕</button>
      <i class="chevron" aria-hidden="true">›</i>
    </div>
  </div>
  <div class="item-body">
    <div class="row">
      <div class="col"><label>Titre</label><input class="bib-title" name="title" /></div>
      <div class="col"><label>Auteurs (séparés par ;)</label><input class="bib-authors" name="authors" /></div>
      <div style="max-width:120px"><label>Année</label><input class="bib-year" name="year" /></div>
    </div>
  </div>
</div>
