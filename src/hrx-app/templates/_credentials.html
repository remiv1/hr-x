<div>
  <h2>Credentials</h2>

  <div class="subsection">
    <div class="subsection-header">
      <h3>Distinctions</h3>
    </div>
    <div id="awards-list">
      {% include '_award_item.html' %}
    </div>
    <button class="add-btn" hx-get="/section/new/award" hx-target="#awards-list" hx-swap="beforeend">+ Ajouter une distinction</button>
  </div>

  <div class="subsection">
    <div class="subsection-header">
      <h3>Références</h3>
    </div>
    <div id="references-list">
      {% include '_reference_item.html' %}
    </div>
    <button class="add-btn" hx-get="/section/new/reference" hx-target="#references-list" hx-swap="beforeend">+ Ajouter une référence</button>
  </div>

  <div class="subsection">
    <div class="subsection-header">
      <h3>Bibliographie</h3>
    </div>
    <div id="bibliography-list">
      {% include '_bibliography_item.html' %}
    </div>
    <button class="add-btn" hx-get="/section/new/bibliography" hx-target="#bibliography-list" hx-swap="beforeend">+ Ajouter une publication</button>
  </div>
</div>
