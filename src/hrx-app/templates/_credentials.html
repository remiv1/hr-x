<div>

  <div id="awards-list">
    {% include '_award_item.html' %}
  </div>
  <div class="actions" style="margin-top:8px">
    <button class="ghost" hx-get="/section/new/award" hx-target="#awards-list" hx-swap="afterend">Ajouter award</button>
  </div>

  <h3 style="margin-top:12px">References</h3>
  <div id="references-list">
    {% include '_reference_item.html' %}
  </div>
  <div class="actions" style="margin-top:8px">
    <button class="ghost" hx-get="/section/new/reference" hx-target="#references-list" hx-swap="afterend">Ajouter référence</button>
  </div>

  <h3 style="margin-top:12px">Bibliography</h3>
  <div id="bibliography-list">
    {% include '_bibliography_item.html' %}
  </div>
  <div class="actions" style="margin-top:8px">
    <button class="ghost" hx-get="/section/new/bibliography" hx-target="#bibliography-list" hx-swap="afterend">Ajouter bibliographie</button>
