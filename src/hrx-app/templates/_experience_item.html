<div class="experience-item card">
  <div class="row">
    <div class="col">
      <label>Poste</label>
      <input class="exp-position" />
    </div>
    <div class="col">
      <label>Organisation</label>
      <input class="exp-organisation" />
    </div>
    <div class="col">
      <label>Secteur</label>
      <input class="exp-sector" />
    </div>
  </div>
  <div class="row" style="margin-top:8px">
    <div class="col">
      <label>Début (YYYY-MM)</label>
      <input class="exp-start" />
    </div>
    <div class="col">
      <label>Fin (YYYY-MM ou vide)</label>
      <input class="exp-end" />
    </div>
    <div style="align-self:center">
      <button type="button" class="remove-experience ghost">Supprimer</button>
    </div>
  </div>
  <div style="margin-top:8px">
    <label>Description</label>
    <textarea class="exp-description" rows="3"></textarea>
  </div>
</div>
