{% extends 'base.html' %}

{% block content %}

<div class="container">

  <!-- Barre upload -->
  <div class="card upload-bar">
    <p class="lead">Remplissez les onglets et téléchargez votre fichier HRX.</p>
    <div class="upload-zone">
      <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data" style="display:flex;align-items:center;gap:8px;">
        <span class="upload-filename" id="upload-filename">Aucun fichier</span>
        <input type="file" id="file-input" name="file" accept=".hrx,application/json" style="display:none" />
        <button type="button" class="ghost" id="browse-btn" style="font-size:13px;padding:7px 12px;">Parcourir</button>
        <button class="ghost" type="submit" style="font-size:13px;padding:7px 12px;">Charger</button>
      </form>
    </div>
  </div>

  <!-- Onglets -->
  <div class="tabs">
    <button class="active" data-target="#tab-identity">Identité</button>
    <button data-target="#tab-skills">Compétences</button>
    <button data-target="#tab-experiences">Expériences</button>
    <button data-target="#tab-education">Éducation</button>
    <button data-target="#tab-credentials">Credentials</button>
    <button data-target="#tab-preferences">Préférences</button>
  </div>

  <div id="tab-panes">
    <div id="tab-identity" class="card tab-pane">
      <div hx-get="/section/identity" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>

    <div id="tab-skills" class="card tab-pane" hidden>
      <div hx-get="/section/skills" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>

    <div id="tab-experiences" class="card tab-pane" hidden>
      <div hx-get="/section/experiences" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>

    <div id="tab-education" class="card tab-pane" hidden>
      <div hx-get="/section/education" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>

    <div id="tab-credentials" class="card tab-pane" hidden>
      <div hx-get="/section/credentials" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>

    <div id="tab-preferences" class="card tab-pane" hidden>
      <div hx-get="/section/preferences" hx-trigger="load" hx-swap="innerHTML"></div>
    </div>
  </div>

</div>

<!-- Barre d’actions sticky -->
<div class="sticky-bar">
  <div class="sticky-bar-inner">
    <div class="sticky-bar-left">
      <span id="sticky-status">Brouillon non sauvegardé</span>
    </div>
    <div class="sticky-bar-actions">
      <button id="save-local" class="ghost">Sauvegarder</button>
      <button id="load-local" class="ghost">Charger local</button>
      <button id="validate" class="ghost">Valider</button>
      <button id="open-json-preview" class="ghost">Aperçu JSON</button>
      <button id="download" class="primary">Télécharger .hrx</button>
    </div>
  </div>
</div>

<!-- Conteneur de toasts -->
<div id="toast-container" aria-live="polite" aria-atomic="false"></div>

<script>
  // Navigation par onglets
  document.addEventListener('click', function (e) {
    const btn = e.target.closest('.tabs button');
    if (!btn) return;
    e.preventDefault();
    document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const target = btn.getAttribute('data-target');
    if (!target) return;
    document.querySelectorAll('.tab-pane').forEach(p => p.hidden = true);
    const pane = document.querySelector(target);
    if (pane) pane.hidden = false;
  });

  // Bouton parcourir + affichage du nom de fichier
  document.addEventListener('DOMContentLoaded', () => {
    const browseBtn  = document.getElementById('browse-btn');
    const fileInp    = document.getElementById('file-input');
    const filenameEl = document.getElementById('upload-filename');
    browseBtn?.addEventListener('click', () => fileInp?.click());
    fileInp?.addEventListener('change', () => {
      if (fileInp.files[0]) filenameEl.textContent = fileInp.files[0].name;
    });
  });
</script>

<div id="json-preview-modal" class="modal" hidden>
  <div class="modal-backdrop" data-close-modal></div>
  <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="json-preview-title">
    <div class="modal-header">
      <div>
        <h3 id="json-preview-title">Aperçu JSON</h3>
        <p class="muted">Le contenu est mis à jour à chaque modification.</p>
      </div>
      <button type="button" class="icon-button" data-close-modal aria-label="Fermer">✕</button>
    </div>
    <textarea id="json-preview" rows="22" spellcheck="false"></textarea>
    <div class="modal-footer">
      <button type="button" class="ghost" id="copy-json-preview">Copier</button>
      <button type="button" class="primary" data-close-modal>Fermer</button>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const modal = document.getElementById('json-preview-modal');
    const openPreviewBtn = document.getElementById('open-json-preview');
    const copyBtn = document.getElementById('copy-json-preview');

    const openModal = () => {
      if (!modal) return;
      modal.hidden = false;
      modal.style.display = 'grid';
      document.body.classList.add('modal-open');
      document.getElementById('json-preview')?.focus();
    };
    const closeModal = () => {
      if (!modal) return;
      modal.hidden = true;
      modal.style.display = 'none';
      document.body.classList.remove('modal-open');
    };

    openPreviewBtn?.addEventListener('click', openModal);
    document.querySelectorAll('[data-close-modal]').forEach(el => el.addEventListener('click', closeModal));
    modal?.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && !modal?.hidden) closeModal(); });

    copyBtn?.addEventListener('click', async () => {
      const preview = document.getElementById('json-preview');
      if (!preview) return;
      await navigator.clipboard.writeText(preview.value);
      const orig = copyBtn.textContent;
      copyBtn.textContent = 'Copié !';
      setTimeout(() => { copyBtn.textContent = orig; }, 1400);
    });
  });
</script>

{% if payload %}
  <script>
    window.SERVER_PAYLOAD = {{ payload_obj|tojson|safe }};
  </script>
{% endif %}

{% if error %}
  <div class="card" style="border-color:#c00;color:#c00">
    <strong>Erreur:</strong> {{ error }}
  </div>
{% endif %}

{% endblock %}
