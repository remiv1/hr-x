<div class="skill-item card">
  <div class="row">
    <div class="col" style="max-width:140px">
      <h4>Type</h4>
      <select class="skill-type">
        <option value="hard">Savoir-faire</option>
        <option value="soft">Savoir-être</option>
      </select>
    </div>
    <div class="col">
      <h4>Domaine</h4>
      <input class="skill-domain" />
    </div>
    <div class="col">
      <h4>Label</h4>
      <input class="skill-label" />
    </div>
    <div style="max-width:160px">
      <h4>Niveau</h4>
      <select class="skill-level">
        <option value="beginner">beginner</option>
        <option value="intermediate">intermediate</option>
        <option value="advanced">advanced</option>
        <option value="expert">expert</option>
      </select>
    </div>
    <div style="align-self:center">
      <button type="button" class="remove-skill ghost">Supprimer</button>
    </div>
  </div>
</div>
